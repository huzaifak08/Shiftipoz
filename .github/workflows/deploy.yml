name: Shiftipoz Release CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 3. Decode Keystore from Secrets
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Install Dependencies
        run: flutter pub get

      # 4. Build Signed APK
      - name: Build APK
        env:
          RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_NUMBER=$((RUN_NUMBER + 8))
          flutter build apk --release \
          --build-name=0.0.8 \
          --build-number=$BUILD_NUMBER

      # 5. Build Signed App Bundle (AAB)
      - name: Build App Bundle
        env:
          RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_NUMBER=$((RUN_NUMBER + 8))
          flutter build appbundle --release \
          --build-name=0.0.8 \
          --build-number=$BUILD_NUMBER

      # 6. Save Artifacts to Actions Tab (Internal Backup)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

      # 7. Create the Public Release (VISIBLE ON REPO SIDEBAR)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          tag_name: v0.0.8-b${{ github.run_number }}
          name: Shiftipoz v0.0.8 (Build ${{ github.run_number }})
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
