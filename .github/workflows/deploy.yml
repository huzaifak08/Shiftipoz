name: Shiftipoz Build & Release

on:
  push:
    branches:
      - master
      - staging

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Install Dependencies
        run: flutter pub get

      # 1. Build the App Bundle (Standard Production Logic)
      - name: Build App Bundle
        env:
          RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Simple increment for Play Store compliance
          BUILD_NUMBER=$((RUN_NUMBER + 20))

          flutter build appbundle --release \
          --build-name=1.0.0 \
          --build-number=$BUILD_NUMBER

      # 2. Build APK (Code preserved but skipped)
      - name: Build APK (Skipped)
        if: false
        run: flutter build apk --release

      # 3. Create GitHub Release (Master branch only)
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          tag_name: v1.0.0-b${{ github.run_number }}
          name: Shiftipoz v1.0.0 (Build ${{ github.run_number }})
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Upload to Play Store (Internal Testing - Staging branch)
      - name: Upload to Play Store (Internal Testing)
        if: github.ref == 'refs/heads/staging'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.firoz.shiftipoz
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      # 5. Upload to Play Store (Production - Master branch)
      - name: Upload to Play Store (Production)
        if: github.ref == 'refs/heads/master'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.firoz.shiftipoz
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
